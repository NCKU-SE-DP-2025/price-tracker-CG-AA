[tool.black]
line-length = 79
target-version = ["py311"]  # adjust to your project's floor

[tool.ruff]
line-length = 79
target-version = "py311"
# PEP 8 only:
select = ["E", "W", "N", "I"]
# Align with Black (PEP 8 allows flexibility here; this avoids false conflicts):
ignore = ["E203"]

# Let Black handle formatting; Ruff will lint/fix PEP 8, including imports & naming.
fix = true

# (Optional) Limit what Ruff scans (recommended for larger repos):
# src = ["src", "tests"]
# exclude = ["dist", "build", ".venv"]
